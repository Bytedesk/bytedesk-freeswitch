# FreeSWITCH Docker Image Build and Push Workflow
# 自动构建 FreeSWITCH Docker 镜像并推送到 Docker Hub 和阿里云镜像仓库

name: Build FreeSWITCH Docker

on:
  push:
    tags:
      # 匹配 v 开头的标签，例如: v1.10.12
      - 'v*'
    paths:
      # 当以下路径发生变化时触发
      - 'docker/**'
  workflow_dispatch:
    # 支持手动触发
    inputs:
      version:
        description: 'FreeSWITCH version to build (e.g., 1.10.12)'
        required: true
        default: '1.10.12'
      mod_audio_stream_ref:
        description: 'mod_audio_stream git ref (branch, tag, or commit SHA)'
        required: true
        default: 'main'
      push_to_registry:
        description: 'Push to Docker registries'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

# 添加权限配置
permissions:
  contents: write
  packages: write

env:
  # 镜像名称
  IMAGE_NAME: bytedesk/freeswitch
  ALIYUN_IMAGE_NAME: registry.cn-hangzhou.aliyuncs.com/bytedesk/freeswitch
  # FreeSWITCH 版本
  FREESWITCH_VERSION: v1.10.12

jobs:
  build-and-push:
    name: Build and Push FreeSWITCH Docker Image
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 提取版本号
      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # 从标签提取版本号，例如: v1.10.12 -> 1.10.12
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building FreeSWITCH version: ${VERSION}"

      # 3. 设置 QEMU (支持多平台构建)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 4. 设置 Docker Buildx
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      # 5. 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: bytedesk
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          logout: false

      # 6. 登录阿里云 Docker Registry
      - name: Login to Aliyun Docker Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}
          logout: false

      # 7. 构建并推送镜像
      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.inputs.push_to_registry != 'false' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.ALIYUN_IMAGE_NAME }}:latest
            ${{ env.ALIYUN_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          labels: |
            org.opencontainers.image.title=ByteDesk FreeSWITCH
            org.opencontainers.image.description=FreeSWITCH Docker image for ByteDesk Call Center
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.vendor=ByteDesk
            org.opencontainers.image.revision=${{ github.sha }}
            maintainer=ByteDesk <270580156@qq.com>
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            FREESWITCH_VERSION=${{ env.FREESWITCH_VERSION }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_SIGNALWIRE=0
            INSTALL_SOUNDS=basic
            ENABLE_VIDEO=1
            MOD_AUDIO_STREAM_REF=${{ github.event.inputs.mod_audio_stream_ref || 'main' }}
            BUILD_UNIMRCP=1
